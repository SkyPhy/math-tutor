<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Math Tutor</title>
    <!-- Apply the saved theme (colour scheme + accent) before first paint so there is
         no flash of the wrong theme. Mirrors localStorage keys used by src/lib/theme.ts. -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('mt-theme-mode');
          document.documentElement.setAttribute('data-theme', m === 'light' ? 'light' : 'dark');
          var c1 = localStorage.getItem('mt-accent-c1');
          var c2 = localStorage.getItem('mt-accent-c2');
          if (c1) document.documentElement.style.setProperty('--accent-blue', c1);
          if (c2) document.documentElement.style.setProperty('--accent-purple', c2);
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- MathJax 3. PROJECT RULE: maths always renders INLINE / fused, never on its own
         line (see src/lib/mathRender.ts). So there are NO display delimiters — $$…$$ and
         \[…\] are registered as *inline* too, a safety net for any content that reaches
         MathJax without first passing through the render modules. -->
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['\\(', '\\)'], ['$$', '$$'], ['\\[', '\\]']],
          displayMath: [],
        },
        options: {
          skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
        },
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  </head>
  <body>
    <!-- Excalidraw resolves its fonts/assets from this path (matches the installed
         version), so the whiteboard renders without 404ing its font files. -->
    <script>
      window.EXCALIDRAW_ASSET_PATH = 'https://unpkg.com/@excalidraw/excalidraw@0.18.1/dist/prod/';
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
