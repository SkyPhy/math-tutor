<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up · AI Math Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f172a; --accent-blue: #38bdf8; --accent-purple: #818cf8;
            --glass-bg: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.1);
            --text-main: #f1f5f9; --text-dim: #94a3b8;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, var(--bg-deep));
            color: var(--text-main); margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px 20px;
        }
        .brand {
            display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 1.2rem;
            margin-bottom: 28px; text-decoration: none; color: var(--text-main);
        }
        .brand .logo {
            width: 40px; height: 40px; display: grid; place-items: center; border-radius: 11px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); font-size: 1.25rem;
        }
        .card {
            width: 100%; max-width: 420px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 22px; padding: 36px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }
        h1 { font-size: 1.7rem; font-weight: 600; margin: 0 0 6px; }
        .sub { color: var(--text-dim); font-weight: 300; margin: 0 0 26px; font-size: 0.97rem; }
        label { display: block; font-size: 0.85rem; color: var(--text-dim); margin: 16px 0 7px; font-weight: 500; }
        input {
            width: 100%; padding: 13px 15px; border-radius: 12px;
            background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
            color: var(--text-main); font-family: inherit; font-size: 1rem;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(56,189,248,0.18); }
        input::placeholder { color: #64748b; }
        .btn {
            width: 100%; margin-top: 24px; padding: 14px; border: none; border-radius: 13px;
            font-family: inherit; font-size: 1.05rem; font-weight: 600; cursor: pointer;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: #0b1020;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(129,140,248,0.35); }
        .btn:disabled { opacity: 0.6; cursor: default; transform: none; box-shadow: none; }
        .msg { margin-top: 18px; padding: 12px 14px; border-radius: 11px; font-size: 0.9rem; display: none; }
        .msg.error { display: block; background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .msg.ok { display: block; background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.3); color: #6ee7b7; }
        .alt { text-align: center; margin-top: 22px; color: var(--text-dim); font-size: 0.92rem; font-weight: 300; }
        .alt a { color: var(--accent-blue); text-decoration: none; font-weight: 500; }
        .alt a:hover { text-decoration: underline; }
        .hint { font-size: 0.78rem; color: #64748b; margin-top: 6px; }
    </style>
</head>

<body>
    <a class="brand" href="index.html"><span class="logo">∑</span><span>AI Math Tutor</span></a>

    <div class="card">
        <h1>Create your account</h1>
        <p class="sub">Sign up to save your progress and sessions.</p>

        <form id="form" onsubmit="return doSignup(event)">
            <label for="username">Username</label>
            <input id="username" name="username" autocomplete="username" placeholder="e.g. ada_lovelace" required>
            <div class="hint">3–32 characters: letters, numbers, . _ -</div>

            <label for="email">Email <span style="opacity:.6">(optional)</span></label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com">

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="new-password" placeholder="At least 6 characters" required>

            <button class="btn" id="submitBtn" type="submit">Sign up</button>
            <div class="msg" id="msg"></div>
        </form>

        <div class="alt">Already have an account? <a href="signin.html">Sign in</a></div>
    </div>

    <script>
        const API = 'http://localhost:8000';

        function show(type, text) {
            const m = document.getElementById('msg');
            m.className = 'msg ' + type;
            m.textContent = text;
        }

        async function doSignup(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true; btn.textContent = 'Creating account…';
            try {
                const resp = await fetch(API + '/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email: email || null, password })
                });
                const data = await resp.json();
                if (!resp.ok) {
                    show('error', data.detail || 'Could not create the account.');
                    return false;
                }
                // Persist the session and go home.
                localStorage.setItem('mt_token', data.token);
                localStorage.setItem('mt_user', data.user.username);
                show('ok', 'Account created! Redirecting…');
                setTimeout(() => { window.location.href = 'index.html'; }, 700);
            } catch (err) {
                show('error', 'Could not reach the server. Is the backend running on port 8000?');
            } finally {
                btn.disabled = false; btn.textContent = 'Sign up';
            }
            return false;
        }
    </script>
</body>

</html>
